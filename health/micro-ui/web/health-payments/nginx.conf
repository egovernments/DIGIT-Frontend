server
{
  listen 80;
  underscores_in_headers on;

  # Gzip compression — reduces JS/CSS transfer by ~70%
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml text/javascript image/svg+xml;

  # Cache file metadata — eliminates repeated stat() calls on overlayfs
  open_file_cache max=1000 inactive=60s;
  open_file_cache_valid 30s;
  open_file_cache_min_uses 1;
  open_file_cache_errors on;

  # Disable access log for static file serving
  access_log off;

  location /payments-ui
  {
    root /var/web;
    index index.html index.htm;
    try_files $uri $uri/ /payments-ui/index.html;

    # Cache static assets for 1 year (hashed filenames handle cache busting)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$
    {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Never cache index.html so new deployments are picked up immediately
    location = /payments-ui/index.html
    {
      expires -1;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
  }
}
