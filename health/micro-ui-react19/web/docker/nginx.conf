server
{
  listen 80;
  underscores_in_headers on;

  # Health check endpoint for Kubernetes probes
  location = / {
    return 200 'OK';
    add_header Content-Type text/plain;
  }

  location /hcm-digit-ui/
  {
    alias /var/web/app/;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }
}
